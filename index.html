<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Woody Boat — C&P Audit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 16px;
      font-weight: 400;
      color: #aaa;
    }

    .boat-select {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 5px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .boat-select:focus { border-color: #666; }
    .boat-select option { background: #2a2a2a; }

    .header-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 5px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn:hover { background: #333; }

    .btn-primary {
      background: #2d6a4f;
      border-color: #2d6a4f;
      color: #fff;
    }

    .btn-primary:hover { background: #3a8464; }

    .btn-danger {
      color: #ef4444;
      border-color: #442020;
    }

    .btn-danger:hover { background: #2a2020; }

    /* Ship diagram */
    .ship-section {
      padding: 20px 24px 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .ship-wrap {
      min-width: 900px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .ship-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Compartment blocks */
    .comp-block {
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .comp-block:hover { opacity: 0.85; }

    .comp-label {
      font-family: 'DM Mono', monospace;
      pointer-events: none;
      user-select: none;
    }

    .rag-dot {
      transition: fill 0.3s, r 0.3s;
    }

    .ship-hint {
      text-align: center;
      font-size: 11px;
      color: #555;
      padding: 2px 0 0;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 18px;
      justify-content: center;
      padding: 6px 0 4px;
      font-size: 11px;
      color: #888;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Rename modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      width: 280px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .modal h3 {
      font-size: 13px;
      font-weight: 400;
      color: #888;
      margin-bottom: 12px;
    }

    .modal input {
      width: 100%;
      background: #333;
      border: 1px solid #555;
      border-radius: 5px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      color: #e0e0e0;
      outline: none;
      margin-bottom: 14px;
    }

    .modal input:focus { border-color: #888; }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .modal-actions button { flex: 1; }

    /* Findings table */
    .findings-section {
      padding: 10px 24px 40px;
    }

    .findings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .findings-header h2 {
      font-size: 14px;
      font-weight: 400;
      color: #888;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #333;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      font-size: 13px;
    }

    thead th {
      background: #252525;
      padding: 10px 10px;
      text-align: left;
      font-weight: 400;
      color: #999;
      border-bottom: 1px solid #333;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 2px 4px;
      border-bottom: 1px solid #2a2a2a;
      vertical-align: middle;
    }

    tbody tr:hover { background: #222; }

    /* Inline inputs */
    .cell-input {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 6px 6px;
      font-family: inherit;
      font-size: 13px;
      color: #e0e0e0;
      outline: none;
    }

    .cell-input:focus {
      border-color: #555;
      background: #2a2a2a;
    }

    .cell-input::placeholder { color: #555; }

    /* RAG select */
    .rag-select {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 6px 6px;
      font-family: inherit;
      font-size: 13px;
      color: #e0e0e0;
      outline: none;
      cursor: pointer;
    }

    .rag-select:focus {
      border-color: #555;
      background: #2a2a2a;
    }

    .rag-select option { background: #2a2a2a; }

    /* RAG cell colour strip */
    td.rag-cell {
      position: relative;
      min-width: 80px;
    }

    td.rag-cell::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 4px;
      border-radius: 2px;
    }

    td.rag-cell.rag-red::before    { background: #ef4444; }
    td.rag-cell.rag-amber::before  { background: #f59e0b; }
    td.rag-cell.rag-green::before  { background: #22c55e; }

    .delete-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 3px;
      line-height: 1;
    }

    .delete-btn:hover { color: #ef4444; background: #2a2020; }

    .add-row-btn {
      margin-top: 10px;
    }

    /* Waterline animation */
    .waterline {
      stroke-dasharray: 12 6;
      animation: waterflow 2s linear infinite;
    }

    @keyframes waterflow {
      to { stroke-dashoffset: -18; }
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #2d6a4f;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      header h1 { font-size: 14px; }
      .ship-section { padding: 12px 16px; }
      .findings-section { padding: 10px 16px 40px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>C&P Audit</h1>
      <select class="boat-select" id="boat-select" onchange="switchBoat(this.value)"></select>
      <button class="btn" onclick="newBoat()">New Boat</button>
      <button class="btn" onclick="renameBoat()">Rename</button>
      <button class="btn btn-danger" onclick="deleteBoat()">Delete</button>
    </div>
    <div class="header-controls">
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </header>

  <div class="ship-section">
    <div class="ship-wrap">
      <svg id="ship-svg" viewBox="0 0 1340 460" xmlns="http://www.w3.org/2000/svg">
        <!-- Hull outline -->
        <path d="M 55 315 L 55 345 Q 55 415, 200 425 L 1100 415 Q 1280 405, 1310 340 L 1310 315" stroke="#555" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <!-- Deck line -->
        <line x1="55" y1="315" x2="1310" y2="315" stroke="#555" stroke-width="1"/>
        <!-- Stern wall -->
        <line x1="55" y1="315" x2="55" y2="195" stroke="#555" stroke-width="1.2"/>
        <!-- Stern upper -->
        <path d="M 55 195 L 75 190 L 340 190" stroke="#555" stroke-width="1" fill="none"/>

        <!-- Left superstructure (G section) -->
        <path d="M 340 315 L 340 118 L 510 118 L 510 315" stroke="#555" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
        <path d="M 360 118 L 360 95 L 490 95 L 490 118" stroke="#555" stroke-width="0.8" fill="none" stroke-linejoin="round"/>

        <!-- Funnel -->
        <rect x="535" y="145" width="40" height="75" rx="2" stroke="#555" stroke-width="0.9" fill="none"/>
        <rect x="540" y="130" width="30" height="15" rx="1" stroke="#555" stroke-width="0.6" fill="none"/>
        <!-- Mast -->
        <line x1="555" y1="130" x2="555" y2="70" stroke="#555" stroke-width="1"/>
        <line x1="540" y1="82" x2="570" y2="82" stroke="#555" stroke-width="0.8"/>

        <!-- Right superstructure (E/bridge area) -->
        <path d="M 720 315 L 720 155 L 1020 155 L 1020 315" stroke="#555" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
        <path d="M 750 155 L 750 130 L 990 130 L 990 155" stroke="#555" stroke-width="0.8" fill="none" stroke-linejoin="round"/>

        <!-- Forward deck -->
        <path d="M 1020 315 L 1020 190 L 1310 190 L 1310 315" stroke="#555" stroke-width="1" fill="none" stroke-linejoin="round"/>

        <!-- Bow taper -->
        <path d="M 1310 195 L 1310 315" stroke="#555" stroke-width="1" fill="none"/>

        <!-- Waterlines -->
        <path class="waterline" d="M 10 370 Q 80 363 200 368 L 1100 365 Q 1200 360 1330 370" stroke="#3a4550" stroke-width="0.7" fill="none"/>
        <path class="waterline" d="M 5 390 Q 100 383 250 387 L 1050 385 Q 1200 380 1340 390" stroke="#2e363d" stroke-width="0.5" fill="none" style="animation-delay:0.5s"/>

        <!-- Compartment blocks (rendered by JS) -->
        <g id="compartments"></g>
      </svg>
    </div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Green — No findings</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Amber</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Red</div>
    </div>
    <div class="ship-hint">Click a compartment to rename it</div>
  </div>

  <div class="findings-section">
    <div class="findings-header">
      <h2>Audit Findings</h2>
      <button class="btn btn-primary add-row-btn" onclick="addRow()">+ Add Finding</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>RAG</th>
            <th>Photo</th>
            <th>Company</th>
            <th>Compartment</th>
            <th>Unit</th>
            <th>High Level Theme</th>
            <th>Theme</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="findings-body"></tbody>
      </table>
    </div>
    <button class="btn btn-primary add-row-btn" onclick="addRow()" style="margin-top:10px">+ Add Finding</button>
  </div>

  <!-- Rename compartment modal -->
  <div class="modal-overlay" id="rename-modal">
    <div class="modal">
      <h3>Labels for <span id="rename-comp-id"></span></h3>
      <input type="text" id="rename-input" placeholder="e.g. D22, UD22, 196" />
      <p style="font-size:10px;color:#666;margin:-10px 0 12px">Comma-separated aliases. First one shows on the block.</p>
      <div class="modal-actions">
        <button class="btn" onclick="closeRenameModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmRename()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Default compartment layout ──
    const BW = 60, BH = 28;

    const DEFAULT_COMPARTMENTS = [
      // D section — stern hull
      { id: 'D42', x: 70,  y: 210 },
      { id: 'D32', x: 133, y: 210 },
      { id: 'D23', x: 196, y: 210 },
      { id: 'D12', x: 259, y: 210 },
      { id: 'D41', x: 70,  y: 241 },
      { id: 'D31', x: 133, y: 241 },
      { id: 'D22', x: 196, y: 241 },
      { id: 'D21', x: 133, y: 272 },
      { id: 'D11', x: 196, y: 272 },

      // G section — aft superstructure
      { id: 'G42S', x: 350, y: 125 },
      { id: 'G41P', x: 440, y: 125 },
      { id: 'G31S', x: 350, y: 156 },
      { id: 'G32P', x: 440, y: 156 },
      { id: 'G22',  x: 350, y: 187 },
      { id: 'G21',  x: 440, y: 187 },
      { id: 'G11',  x: 350, y: 218 },

      // F section — between superstructures
      { id: 'F12', x: 610, y: 195 },
      { id: 'F11', x: 610, y: 226 },

      // H section — funnel area
      { id: 'H11', x: 660, y: 195 },

      // C section — center hull
      { id: 'C32', x: 540, y: 253 },
      { id: 'C22', x: 603, y: 253 },
      { id: 'C12', x: 666, y: 253 },
      { id: 'C31', x: 540, y: 284 },
      { id: 'C21', x: 603, y: 284 },
      { id: 'C11', x: 666, y: 284 },

      // E section — forward superstructure
      { id: 'E32', x: 730, y: 170 },
      { id: 'E22', x: 793, y: 170 },
      { id: 'E12', x: 856, y: 170 },
      { id: 'E31', x: 730, y: 201 },
      { id: 'E21', x: 793, y: 201 },
      { id: 'E11', x: 856, y: 201 },

      // B section — forward hull (4 rows x 3 cols)
      { id: 'B34', x: 940,  y: 170 },
      { id: 'B24', x: 1003, y: 170 },
      { id: 'B14', x: 1066, y: 170 },
      { id: 'B33', x: 940,  y: 201 },
      { id: 'B23', x: 1003, y: 201 },
      { id: 'B13', x: 1066, y: 201 },
      { id: 'B32', x: 940,  y: 232 },
      { id: 'B22', x: 1003, y: 232 },
      { id: 'B12', x: 1066, y: 232 },
      { id: 'B31', x: 940,  y: 263 },
      { id: 'B21', x: 1003, y: 263 },
      { id: 'B11', x: 1066, y: 263 },

      // A section — bow (vertical stack)
      { id: 'A25', x: 1200, y: 201 },
      { id: 'A24', x: 1200, y: 232 },
      { id: 'A23', x: 1200, y: 263 },
      { id: 'A22', x: 1200, y: 294 },
      { id: 'A21', x: 1263, y: 294 },
    ];

    // ── Boat data model ──
    // Each boat: { id, name, labels: { compId: displayLabel }, findings: [] }
    const STORAGE_KEY = 'woody_boats';
    const ACTIVE_KEY = 'woody_active_boat';

    function loadBoats() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
      // Migrate from old format if present
      const oldFindings = localStorage.getItem('woody_findings');
      const defaultBoat = createBoatData('Ship 3');
      if (oldFindings) {
        defaultBoat.findings = JSON.parse(oldFindings);
        localStorage.removeItem('woody_findings');
      }
      return [defaultBoat];
    }

    function createBoatData(name) {
      const labels = {};
      DEFAULT_COMPARTMENTS.forEach(c => { labels[c.id] = [c.id]; });
      return {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name,
        labels,
        findings: []
      };
    }

    // Normalize labels: ensure they're always arrays (migrate old string format)
    function getLabels(boat, compId) {
      const val = boat.labels[compId];
      if (!val) return [compId];
      if (Array.isArray(val)) return val;
      // Migrate old string format
      return [val];
    }

    let boats = loadBoats();
    let activeBoatId = localStorage.getItem(ACTIVE_KEY) || boats[0].id;

    // Ensure active boat exists
    if (!boats.find(b => b.id === activeBoatId)) activeBoatId = boats[0].id;

    function getActiveBoat() {
      return boats.find(b => b.id === activeBoatId);
    }

    function saveAll() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(boats));
      localStorage.setItem(ACTIVE_KEY, activeBoatId);
    }

    // ── Boat selector ──
    const boatSelect = document.getElementById('boat-select');

    function renderBoatSelect() {
      boatSelect.innerHTML = '';
      boats.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.id;
        opt.textContent = b.name;
        if (b.id === activeBoatId) opt.selected = true;
        boatSelect.appendChild(opt);
      });
    }

    function switchBoat(id) {
      activeBoatId = id;
      saveAll();
      renderAll();
    }

    function newBoat() {
      const name = prompt('Boat name:');
      if (!name || !name.trim()) return;
      const boat = createBoatData(name.trim());
      boats.push(boat);
      activeBoatId = boat.id;
      saveAll();
      renderAll();
      showToast('Created ' + boat.name);
    }

    function renameBoat() {
      const boat = getActiveBoat();
      const name = prompt('Rename boat:', boat.name);
      if (!name || !name.trim()) return;
      boat.name = name.trim();
      saveAll();
      renderBoatSelect();
      showToast('Renamed to ' + boat.name);
    }

    function deleteBoat() {
      if (boats.length <= 1) {
        showToast('Cannot delete the only boat');
        return;
      }
      const boat = getActiveBoat();
      if (!confirm('Delete "' + boat.name + '" and all its findings?')) return;
      boats = boats.filter(b => b.id !== activeBoatId);
      activeBoatId = boats[0].id;
      saveAll();
      renderAll();
      showToast('Deleted');
    }

    // ── Compartment rendering ──
    const compGroup = document.getElementById('compartments');
    const ns = 'http://www.w3.org/2000/svg';

    function renderCompartments() {
      compGroup.innerHTML = '';
      const boat = getActiveBoat();
      const ragMap = computeRAGMap(boat);

      DEFAULT_COMPARTMENTS.forEach(comp => {
        const aliases = getLabels(boat, comp.id);
        const label = aliases[0];
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('class', 'comp-block');
        g.setAttribute('data-id', comp.id);

        // Block rect
        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('x', comp.x);
        rect.setAttribute('y', comp.y);
        rect.setAttribute('width', BW);
        rect.setAttribute('height', BH);
        rect.setAttribute('rx', '2');
        rect.setAttribute('fill', '#1a4a3a');
        rect.setAttribute('stroke', '#2d6a4f');
        rect.setAttribute('stroke-width', '0.8');
        g.appendChild(rect);

        // Label text
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', comp.x + BW / 2);
        text.setAttribute('y', comp.y + BH / 2 + 4);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', '#a0c4b0');
        text.setAttribute('font-size', label.length > 4 ? '7.5' : '9');
        text.setAttribute('font-family', 'DM Mono, monospace');
        text.setAttribute('class', 'comp-label');
        text.textContent = label;
        g.appendChild(text);

        // RAG dots — one per finding, or a single green if none
        const rags = ragMap[comp.id] || [];
        const RAG_COLORS = { 'Red': '#ef4444', 'Amber': '#f59e0b', 'Green': '#22c55e' };
        const priority = { 'Red': 3, 'Amber': 2, 'Green': 1 };

        if (rags.length === 0) {
          // No findings — single green dot
          const dot = document.createElementNS(ns, 'circle');
          dot.setAttribute('cx', comp.x + BW - 8);
          dot.setAttribute('cy', comp.y + BH / 2);
          dot.setAttribute('r', '4');
          dot.setAttribute('fill', '#22c55e');
          dot.setAttribute('class', 'rag-dot');
          g.appendChild(dot);
        } else {
          // Position dots in a row, spaced evenly
          const dotR = 4.5;
          const spacing = Math.min(12, (BW - 16) / rags.length);
          const startX = comp.x + BW - 8 - (rags.length - 1) * spacing;
          rags.forEach((rag, di) => {
            const dot = document.createElementNS(ns, 'circle');
            dot.setAttribute('cx', startX + di * spacing);
            dot.setAttribute('cy', comp.y + 9);
            dot.setAttribute('r', String(dotR));
            dot.setAttribute('fill', RAG_COLORS[rag] || '#22c55e');
            dot.setAttribute('class', 'rag-dot');
            g.appendChild(dot);
          });

          // Border highlight — worst RAG wins
          const worst = rags.reduce((a, b) => (priority[a] || 0) >= (priority[b] || 0) ? a : b);
          if (worst === 'Red' || worst === 'Amber') {
            rect.setAttribute('stroke', RAG_COLORS[worst]);
            rect.setAttribute('stroke-width', '1.5');
          }
        }

        // Click to rename
        g.addEventListener('click', () => openRenameModal(comp.id, aliases));

        compGroup.appendChild(g);
      });
    }

    // Returns { compId: ['Red', 'Green', ...] } — one entry per finding
    function computeRAGMap(boat) {
      const ragMap = {};

      // Build reverse label map: every alias -> comp ID
      const labelToId = {};
      DEFAULT_COMPARTMENTS.forEach(comp => {
        labelToId[comp.id.toUpperCase()] = comp.id;
        const aliases = getLabels(boat, comp.id);
        aliases.forEach(a => { labelToId[a.toUpperCase()] = comp.id; });
      });

      boat.findings.forEach(f => {
        if (!f.unit || !f.rag) return;
        const units = f.unit.split(/[\/,;]\s*/);
        units.forEach(raw => {
          let compId = raw.trim();
          if (compId.match(/^U[A-Z]/i)) compId = compId.slice(1);
          const match = resolveCompartment(compId.toUpperCase(), labelToId);
          if (match) {
            if (!ragMap[match]) ragMap[match] = [];
            ragMap[match].push(f.rag);
          }
        });
      });
      return ragMap;
    }

    function resolveCompartment(id, labelToId) {
      if (labelToId[id]) return labelToId[id];
      // Try stripping parentheses: G42(S) -> G42S
      const cleaned = id.replace(/[()]/g, '');
      if (labelToId[cleaned]) return labelToId[cleaned];
      // Try with S/P suffix
      if (labelToId[id + 'S']) return labelToId[id + 'S'];
      if (labelToId[id + 'P']) return labelToId[id + 'P'];
      return null;
    }

    // ── Rename modal ──
    let renamingCompId = null;
    const renameModal = document.getElementById('rename-modal');
    const renameInput = document.getElementById('rename-input');
    const renameCompIdSpan = document.getElementById('rename-comp-id');

    function openRenameModal(compId, aliases) {
      renamingCompId = compId;
      renameCompIdSpan.textContent = compId;
      renameInput.value = aliases.join(', ');
      renameModal.classList.add('open');
      setTimeout(() => { renameInput.focus(); renameInput.select(); }, 50);
    }

    function closeRenameModal() {
      renameModal.classList.remove('open');
      renamingCompId = null;
    }

    function confirmRename() {
      if (!renamingCompId) return;
      const boat = getActiveBoat();
      const raw = renameInput.value.trim();
      if (raw) {
        const aliases = raw.split(/,\s*/).map(s => s.trim()).filter(Boolean);
        boat.labels[renamingCompId] = aliases.length > 0 ? aliases : [renamingCompId];
      } else {
        boat.labels[renamingCompId] = [renamingCompId];
      }
      saveAll();
      renderCompartments();
      closeRenameModal();
    }

    renameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmRename();
      if (e.key === 'Escape') closeRenameModal();
    });

    renameModal.addEventListener('click', e => {
      if (e.target === renameModal) closeRenameModal();
    });

    // ── Table rendering ──
    const tbody = document.getElementById('findings-body');

    function renderTable() {
      tbody.innerHTML = '';
      const boat = getActiveBoat();
      boat.findings.forEach((f, i) => renderRow(f, i, boat));
    }

    function renderRow(f, idx, boat) {
      const tr = document.createElement('tr');
      tr.dataset.idx = idx;

      // RAG
      const ragTd = document.createElement('td');
      ragTd.className = 'rag-cell' + (f.rag ? ' rag-' + f.rag.toLowerCase() : '');
      const ragSel = document.createElement('select');
      ragSel.className = 'rag-select';
      ['', 'Red', 'Amber', 'Green'].forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v || '\u2014';
        if (v === f.rag) opt.selected = true;
        ragSel.appendChild(opt);
      });
      ragSel.onchange = () => {
        f.rag = ragSel.value;
        ragTd.className = 'rag-cell' + (f.rag ? ' rag-' + f.rag.toLowerCase() : '');
        save();
      };
      ragTd.appendChild(ragSel);
      tr.appendChild(ragTd);

      // Text fields
      const fields = [
        { key: 'photo', placeholder: '#' },
        { key: 'company', placeholder: 'Company' },
        { key: 'compartment', placeholder: 'Comp.' },
        { key: 'unit', placeholder: 'e.g. UB14' },
        { key: 'highLevelTheme', placeholder: 'Theme' },
        { key: 'theme', placeholder: 'Detail' },
      ];

      fields.forEach(({ key, placeholder }) => {
        const td = document.createElement('td');
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'cell-input';
        input.placeholder = placeholder;
        input.value = f[key] || '';
        input.oninput = () => {
          f[key] = input.value;
          save();
        };
        td.appendChild(input);
        tr.appendChild(td);
      });

      // Delete
      const delTd = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '\u00d7';
      delBtn.title = 'Delete finding';
      delBtn.onclick = () => {
        boat.findings.splice(idx, 1);
        save();
        renderTable();
      };
      delTd.appendChild(delBtn);
      tr.appendChild(delTd);

      tbody.appendChild(tr);
    }

    function addRow() {
      const boat = getActiveBoat();
      boat.findings.push({ rag: '', photo: '', company: '', compartment: '', unit: '', highLevelTheme: '', theme: '' });
      save();
      renderTable();
      const rows = tbody.querySelectorAll('tr');
      const lastRow = rows[rows.length - 1];
      if (lastRow) {
        const firstInput = lastRow.querySelector('.cell-input');
        if (firstInput) firstInput.focus();
      }
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function save() {
      saveAll();
      renderCompartments();
    }

    // ── CSV export ──
    function exportCSV() {
      const boat = getActiveBoat();
      if (boat.findings.length === 0) {
        showToast('No findings to export');
        return;
      }
      const headers = ['RAG', 'Photo', 'Company', 'Compartment', 'Unit', 'High Level Theme', 'Theme'];
      const keys = ['rag', 'photo', 'company', 'compartment', 'unit', 'highLevelTheme', 'theme'];
      const rows = boat.findings.map(f => {
        return keys.map(k => {
          const val = (f[k] || '').toString();
          if (val.includes(',') || val.includes('"') || val.includes('\n')) {
            return '"' + val.replace(/"/g, '""') + '"';
          }
          return val;
        }).join(',');
      });
      const csv = headers.join(',') + '\n' + rows.join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = boat.name.replace(/\s+/g, '-').toLowerCase() + '-findings.csv';
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV exported');
    }

    // ── Toast ──
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ── Render all ──
    function renderAll() {
      renderBoatSelect();
      renderCompartments();
      renderTable();
    }

    renderAll();
  </script>
</body>
</html>
